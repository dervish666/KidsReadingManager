<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Help — Tally Reading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    :root {
      --cream: #FBF7F0;
      --cream-deep: #F4EDDD;
      --cream-dark: #EDE3CE;
      --paper: #FEFCF7;
      --warm-white: #FFFFFF;
      --sage: #6B8F6B;
      --sage-light: #E8EFE4;
      --sage-soft: #F2F6EE;
      --sage-dark: #4A6B4A;
      --sage-deep: #344F35;
      --coral: #C47C5A;
      --coral-light: #FDF0EA;
      --coral-soft: #FAE6DA;
      --coral-dark: #A86040;
      --amber: #C9A84C;
      --amber-light: #FBF1D6;
      --amber-soft: #F5E6B5;
      --amber-dark: #8B7020;
      --sky: #7BAFD4;
      --sky-light: #EBF3F9;
      --sky-soft: #DDEBF5;
      --sky-dark: #4D7FA3;
      --ink: #2D2A26;
      --ink-soft: #4A453F;
      --muted: #6B6560;
      --muted-light: #9B9590;
      --hairline: #E8E0CF;
      --hairline-soft: #F0E8D6;
      --bookshelf: #C4A882;
      --shadow-sm: 0 1px 2px rgba(45, 42, 38, 0.04), 0 1px 3px rgba(45, 42, 38, 0.03);
      --shadow-md: 0 2px 4px rgba(45, 42, 38, 0.04), 0 8px 24px rgba(45, 42, 38, 0.06);
      --shadow-lg: 0 4px 8px rgba(45, 42, 38, 0.04), 0 24px 48px rgba(45, 42, 38, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      background: var(--cream);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    h1, h2, h3, h4, h5 {
      font-family: 'Fraunces', serif;
      font-weight: 500;
      line-height: 1.15;
      letter-spacing: -0.015em;
      color: var(--ink);
    }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    a { color: inherit; text-decoration: none; }
    input, textarea { font-family: inherit; }

    /* paper grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.4;
      z-index: 0;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(196, 168, 130, 0.04) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(107, 143, 107, 0.03) 0%, transparent 40%);
    }

    #root { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="help-app.jsx"></script>
</body>
</html>
