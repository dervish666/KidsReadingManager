# contexts/ and hooks/ structure detail
module: tally-reading
directories: [src/contexts/, src/hooks/]
description: React context providers and custom hooks

files:
  contexts/data/useStudentOperations.js:
    description: Student CRUD operations extracted from DataContext
    exports:
      - name: useStudentOperations
        kind: function
        params: [fetchWithAuth, setStudents, setApiError]
        returns: "{ addStudent, bulkImportStudents, updateStudent, updateStudentClassId, updateStudentCurrentBook, deleteStudent }"

  contexts/data/useBookOperations.js:
    description: Book CRUD operations extracted from DataContext
    exports:
      - name: useBookOperations
        kind: function
        params: [fetchWithAuth, books, setBooks, setApiError]
        returns: "{ addBook, updateBook, updateBookField, findOrCreateBook, fetchBookDetails }"

  contexts/data/useSessionOperations.js:
    description: Reading session operations extracted from DataContext
    exports:
      - name: useSessionOperations
        kind: function
        params: [fetchWithAuth, setStudents, setApiError]
        returns: "{ addReadingSession, editReadingSession, deleteReadingSession }"

  contexts/data/useClassOperations.js:
    description: Class CRUD and genre operations extracted from DataContext
    exports:
      - name: useClassOperations
        kind: function
        params: [fetchWithAuth, setClasses, setStudents, setGenres, setApiError]
        returns: "{ addClass, updateClass, deleteClass, addGenre }"

  contexts/AppContext.js:
    description: Central app state - auth, students, classes, books, genres, settings, multi-org
    exports:
      - name: useAppContext
        kind: hook
        returns: AppContext value object
        description: Access global app state and methods
      - name: AppProvider
        kind: component
        description: Context provider wrapping entire app
    state:
      # Auth
      - authToken: string|null
      - authMode: "'legacy'|'multitenant'"
      - user: "object|null (id, name, email, role, organizationId, authProvider)"
      - isAuthenticated: boolean
      - isMultiTenantMode: boolean
      - userRole: "'owner'|'admin'|'teacher'|'readonly'|null"
      - organization: "object|null (id, name, slug)"
      - canManageUsers: boolean
      - canManageStudents: boolean
      - canManageClasses: boolean
      - canManageSettings: boolean
      # Data
      - students: Student[]
      - classes: Class[]
      - books: Book[]
      - genres: Genre[]
      - settings: object
      # UI
      - loading: boolean
      - apiError: string|null
      - globalClassFilter: "'all'|classId"
      - priorityStudentCount: number
      - recentlyAccessedStudents: string[]
      - markedPriorityStudentIds: Set<string>
      - prioritizedStudents: Student[]
      # Multi-org (owners only)
      - availableOrganizations: Organization[]
      - activeOrganizationId: string|null
    methods:
      # Auth
      - name: login
        params: [password]
        description: Legacy shared password auth
      - name: loginWithEmail
        params: [email, password]
        description: Multi-tenant email/password login
      - name: forgotPassword
        params: [email]
      - name: resetPassword
        params: [token, newPassword]
      - name: logout
        description: Logout and clear state (handles SSO)
      - name: refreshAccessToken
        description: Refresh JWT; shared promise for concurrent callers
      - name: fetchWithAuth
        params: [url, options]
        description: "Fetch with JWT, auto-refresh, X-Organization-Id header"
      # Data loading
      - name: reloadDataFromServer
        description: Reload all data from API
      # Student CRUD
      - name: addStudent
        params: [name, classId]
      - name: bulkImportStudents
        params: [names, classId]
      - name: updateStudent
        params: [id, updatedData]
      - name: updateStudentClassId
        params: [studentId, classId]
      - name: updateStudentCurrentBook
        params: [studentId, bookId, bookTitle, bookAuthor]
      - name: deleteStudent
        params: [id]
      # Session CRUD
      - name: addReadingSession
        params: [studentId, sessionData]
      - name: editReadingSession
        params: [studentId, sessionId, updatedSessionData]
      - name: deleteReadingSession
        params: [studentId, sessionId]
      # Book CRUD
      - name: addBook
        params: [title, author]
      - name: findOrCreateBook
        params: [title, author]
        description: Case-insensitive find or create
      - name: updateBook
        params: [id, updatedFields]
      - name: updateBookField
        params: [id, field, value]
      # Class CRUD
      - name: addClass
        params: [classData]
      - name: updateClass
        params: [id, updatedFields]
      - name: deleteClass
        params: [id]
      # Genre
      - name: addGenre
        params: [genreData]
      # Settings
      - name: updateSettings
        params: [newSettings]
      # Import/Export
      - name: exportToJson
        description: Export all data as downloadable JSON
      - name: importFromJson
        params: [file]
      # UI helpers
      - name: getReadingStatus
        params: [student]
        returns: "'never'|'recent'|'attention'|'overdue'"
      - name: updateGlobalClassFilter
        params: [classId]
      - name: addRecentlyAccessedStudent
        params: [studentId]
      - name: updatePriorityStudentCount
        params: [count]
      - name: markStudentAsPriorityHandled
        params: [studentId]
      - name: resetPriorityList
      # Multi-org
      - name: switchOrganization
        params: [orgId]
        description: Switch active org and reload data (owners only)
      - name: fetchAvailableOrganizations

