name = "kids-reading-manager"
main = "src/worker.js"
compatibility_date = "2025-04-09"
compatibility_flags = ["nodejs_compat"]

# KV Namespace for storing application data (students, classes, settings, genres)
kv_namespaces = [
  { binding = "READING_MANAGER_KV", id = "09297a22cb3b4abc96bf0a5d4c79b4e9", preview_id = "6b452436a7794d36810e929dde07debf" },
  { binding = "RECOMMENDATIONS_CACHE", id = "e5ea3bf7cf9946edb4e5f0ef0d837c73", preview_id = "c323071d32ad44c8bdc1f5ec5094e083" }
]

# Email sending binding (requires Email Routing enabled on domain)
# Binding name "EMAIL_SENDER" will be available as env.EMAIL_SENDER in the worker
send_email = [
  { name = "EMAIL_SENDER" }
]

# Route configuration for custom domain
routes = [
  { pattern = "reading.brisflix.com/*", zone_name = "brisflix.com" },
  { pattern = "tallyreading.uk/*", zone_name = "tallyreading.uk" }
]

# D1 Database for storing books (scalable SQL storage for large book collections)
[[d1_databases]]
binding = "READING_MANAGER_DB"
database_name = "reading-manager-db"
database_id = "30afac38-bccf-436b-8197-b59dabc73384"
migrations_dir = "migrations"
# GDPR note: D1 location hint is set at database creation time (--location=weur).
# Check current location in Cloudflare dashboard. If not weur, consider recreating
# the database with: wrangler d1 create reading-manager-db --location=weur

# R2 bucket for caching book cover images
[[r2_buckets]]
binding = "BOOK_COVERS"
bucket_name = "book-covers"

# Configuration for serving static assets (React frontend)
# Static assets with SPA routing; run Worker first for all /api/* paths
# so browser navigations (e.g. OAuth callbacks) hit the Worker, not index.html
[assets]
directory = "./build"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

# Environment variables
[vars]
ENVIRONMENT = "production"
STORAGE_TYPE = "kv"
ALLOWED_ORIGINS = "https://kids-reading-manager.brisflix.workers.dev/,https://reading.brisflix.com,https://tallyreading.uk"
EMAIL_FROM = "hello@tallyreading.uk"

# MyLogin OAuth2 SSO (set via `wrangler secret put`)
# MYLOGIN_CLIENT_ID - OAuth client ID from MyLogin developer portal
# MYLOGIN_CLIENT_SECRET - OAuth client secret
# MYLOGIN_REDIRECT_URI - https://tallyreading.uk/api/auth/mylogin/callback

[observability.logs]
enabled = true

# Cron triggers for scheduled tasks
# 2:00 AM UTC - Recalculate all student streaks
# 3:00 AM UTC - Wonde daily delta sync
[triggers]
crons = ["0 2 * * *", "0 3 * * *"]
